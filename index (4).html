<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>画像リサイズ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>画像リサイズ＋品質調整</h1>

  <div class="upload-area" id="uploadArea">
    <p>クリック・ドラッグ＆ドロップ・貼り付けで画像を追加</p>
    <p class="sub">「Ctrl+V」で貼り付けできます</p>
  <!--acceptで制限する-->
  <input type="file" id="upload" accept="image/*">
</div>

  <div class="row">
    幅: <input type="number" id="width">
    高さ: <input type="number" id="height">
  </div>

  <div class="row">
    品質: <input type="range" id="quality" min="0.05" max="1" step="0.01" value="0.8">
    <span id="qualityValue">0.8</span>
  </div>

  <div class="row">
    容量: <span id="fileSize">-</span>
  </div>

  <div class="preview">
    <div>
      <p>Before</p>
      <canvas id="beforeCanvas"></canvas>
    </div>
    <div>
      <p>After</p>
      <img id="afterImage">
    </div>
  </div>

  <div class="row">
    <button onclick="downloadImage()">ダウンロード</button>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
